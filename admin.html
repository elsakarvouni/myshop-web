<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Super Market</title>
    <style>
        /* Στυλ παρόμοια με το User αλλά σε σκούρο θέμα για τον Admin */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c3e50; 
            color: #ecf0f1; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* --- Header / Navigation Bar --- */
        .header {
            background-color: #1a252f; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; width: 100%; top: 0; z-index: 1000; height: 70px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); box-sizing: border-box; gap: 20px;
        }
        .menu-area { display: flex; align-items: center; min-width: 180px; }
        .menu-icon { font-size: 24px; cursor: pointer; margin-right: 15px; }
        .logo { font-size: 1.5em; font-weight: bold; color: #3498db; }
        
        .search-container { flex-grow: 1; max-width: 500px; display: flex; align-items: center; }
        .search-input { width: 100%; padding: 10px; border-radius: 5px 0 0 5px; border: none; outline: none; }
        .search-btn { background: #3498db; border: none; padding: 10px 20px; border-radius: 0 5px 5px 0; cursor: pointer; color: white; }

        .logout-btn { background: #c0392b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .logout-btn:hover { background: #e74c3c; }

        /* --- SIDEBAR --- */
        /* Προσοχή: Το κάναμε 2001 για να είναι πάνω από το overlay (που είναι 1500) αλλιώς έκρυβε το μενού */
        .sidebar { 
            height: 100%; width: 280px; position: fixed; 
            z-index: 2001; 
            top: 0; left: -280px; 
            background-color: #1a252f; overflow-y: auto; transition: 0.3s; 
            padding-top: 80px; box-sizing: border-box; padding-bottom: 50px;
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { color: #bdc3c7; text-align: center; border-bottom: 1px solid #34495e; padding-bottom: 10px; margin-top: 20px; font-size: 1.1em; }
        
        .sidebar-section { padding: 0 10px; margin-bottom: 20px; }
        .category-btn { 
            padding: 12px 15px; width: 100%; text-align: left; background: none; border: none; 
            color: #ecf0f1; cursor: pointer; transition: 0.2s; border-radius: 5px; font-size: 1em;
        }
        .category-btn:hover { background-color: #34495e; }
        
        /* Κουμπιά ενεργειών Admin */
        .action-btn { background: #2980b9; margin-bottom: 5px; font-weight: bold; }
        .action-btn:hover { background: #3498db; }
        .stats-btn { background: #8e44ad; margin-bottom: 5px; }
        .stats-btn:hover { background: #9b59b6; }

        /* --- Main Content --- */
        .main-content { margin-top: 80px; padding: 20px; transition: 0.3s; }
        #page-title { text-align: center; margin-bottom: 20px; }
        
        /* Χρήση CSS Grid για τις κάρτες των προϊόντων */
        #products-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* Product Card */
        .product-card { 
            background: #ecf0f1; color: #2c3e50; border-radius: 8px; padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; position: relative;
        }
        .title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; height: 40px; overflow: hidden; }
        .price-qty { display: flex; justify-content: space-between; margin: 10px 0; font-weight: bold; background: #bdc3c7; padding: 5px; border-radius: 5px; }
        
        .card-actions { display: flex; gap: 10px; margin-top: 10px; }
        .card-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .edit-btn { background: #f39c12; }
        .delete-btn { background: #e74c3c; }

        /* --- Modals (Αναδυόμενα Παράθυρα) --- */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; background: white; color: #333; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 2002; flex-direction: column; }
        .modal-header { background: #34495e; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px 10px 0 0; }
        .close-btn { background: none; border: none; color: white; font-size: 1.5em; cursor: pointer; }
        .modal-body { padding: 20px; overflow-y: auto; max-height: 70vh; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; }
        
        #stats-content { white-space: pre-wrap; font-family: monospace; background: #f9f9f9; padding: 15px; border: 1px solid #ddd; }
        
        /* Overlays (Μαύρο φόντο όταν ανοίγει κάτι) */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        
        /* Responsive design για κινητά */
        @media (max-width: 600px) {
            .header { flex-wrap: wrap; height: auto; }
            .search-container { order: 3; width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-area">
            <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
            <div class="logo">ADMIN PANEL</div>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Αναζήτηση προϊόντος..." onkeypress="if(event.key==='Enter') performSearch()">
            <button class="search-btn" onclick="performSearch()">🔍</button>
        </div>
        <button class="logout-btn" onclick="window.location.href='index.html'">🚪 Έξοδος</button>
    </div>

    <div id="overlay" onclick="toggleMenu()"></div>
    
    <div id="mySidebar" class="sidebar">
        <div class="sidebar-section">
            <h2>⚙️ Διαχείριση</h2>
            <button class="category-btn action-btn" onclick="openAddModal()">➕ Προσθήκη Προϊόντος</button>
            <button class="category-btn stats-btn" onclick="showStats('topsellers')">🏆 Top Sellers</button>
            <button class="category-btn stats-btn" onclick="showStats('unavailable')">⚠️ Sold Out / Ελλείψεις</button>
        </div>
        <div class="sidebar-section">
            <h2>📂 Κατηγορίες</h2>
            <button class="category-btn" onclick="loadAllProducts(); toggleMenu()">Όλα τα προϊόντα</button>
            <div id="categories-list"></div>
        </div>
    </div>

    <div class="main-content">
        <h2 id="page-title">Επισκόπηση Προϊόντων</h2>
        <div id="products-container"><p style="text-align:center">Φόρτωση δεδομένων από τον Server...</p></div>
    </div>

    <div id="modal-overlay" onclick="closeAllModals()"></div>

    <div id="add-modal" class="modal">
        <div class="modal-header">
            <h2>Προσθήκη Νέου Προϊόντος</h2>
            <button class="close-btn" onclick="closeAllModals()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group"><label>Τίτλος</label><input type="text" id="add-title"></div>
            <div class="form-group"><label>Περιγραφή</label><input type="text" id="add-desc"></div>
            <div class="form-group"><label>Κατηγορία</label><input type="text" id="add-cat"></div>
            <div class="form-group"><label>Υποκατηγορία</label><input type="text" id="add-sub"></div>
            <div class="form-group"><label>Τιμή (€)</label><input type="number" step="0.01" id="add-price"></div>
            <div class="form-group"><label>Ποσότητα</label><input type="number" id="add-qty"></div>
            <button class="submit-btn" onclick="performAdd()">Αποθήκευση</button>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-header">
            <h2>Επεξεργασία Προϊόντος</h2>
            <button class="close-btn" onclick="closeAllModals()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit-original-title">
            <div class="form-group"><label>Τίτλος</label><input type="text" id="edit-title" disabled style="background:#eee"></div>
            <div class="form-group"><label>Νέα Τιμή (€)</label><input type="number" step="0.01" id="edit-price"></div>
            <div class="form-group"><label>Νέα Ποσότητα</label><input type="number" id="edit-qty"></div>
            <button class="submit-btn" style="background:#f39c12" onclick="performUpdate()">Ενημέρωση</button>
        </div>
    </div>

    <div id="stats-modal" class="modal">
        <div class="modal-header">
            <h2 id="stats-title">Στατιστικά</h2>
            <button class="close-btn" onclick="closeAllModals()">&times;</button>
        </div>
        <div class="modal-body"><div id="stats-content">Φόρτωση...</div></div>
    </div>

    <script>
        // --- ΑΡΧΙΚΟΠΟΙΗΣΗ (Όταν φορτώνει η σελίδα) ---
        
        // Φέρνουμε τις κατηγορίες από το Java Backend
        fetch('http://localhost:8080/categories')
            .then(res => res.json())
            .then(cats => {
                console.log("Κατηγορίες που ήρθαν από το backend:", cats); // Debugging info
                const list = document.getElementById('categories-list');
                
                cats.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.innerText = cat.catname;
                    btn.onclick = function() { 
                        filterProducts(cat.catname); 
                        toggleMenu(); 
                    };
                    list.appendChild(btn);
                });
            })
            .catch(err => console.error("Σφάλμα σύνδεσης. Το Java backend τρέχει?", err));

        // Φορτώνουμε όλα τα προϊόντα αρχικά
        loadAllProducts();

        // --- ΒΑΣΙΚΕΣ ΣΥΝΑΡΤΗΣΕΙΣ ---

        function loadAllProducts() {
            fetch('http://localhost:8080/products')
                .then(res => res.json())
                .then(prods => {
                    renderProducts(prods);
                    document.getElementById('page-title').innerText = "Όλα τα προϊόντα (" + prods.length + ")";
                });
        }

        function performSearch() {
            const query = document.getElementById('search-input').value; 
            
            if(!query) { 
                loadAllProducts(); 
                return; 
            }

            fetch('http://localhost:8080/products/search?query=' + query)
                .then(r => r.json())
                .then(res => {
                    document.getElementById('page-title').innerText = `Αποτελέσματα για: "${query}"`; 
                    renderProducts(res);
                });
        }

        // Συνάρτηση που "ζωγραφίζει" τις κάρτες των προϊόντων στο HTML
        function renderProducts(list) {
            const container = document.getElementById('products-container'); 
            container.innerHTML = '';
            
            if (list.length === 0) {
                container.innerHTML = '<p style="text-align:center; width: 100%;">Δεν βρέθηκαν προϊόντα.</p>';
                return;
            }

            list.forEach(p => {
                const card = `
                    <div class="product-card">
                        <div class="title">${p.title}</div>
                        <div style="font-size:0.9em; margin-bottom:10px">${p.catname} / ${p.subname}</div>
                        <div class="price-qty">
                            <span>${p.price} €</span>
                            <span>Stock: ${p.quantity}</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn edit-btn" onclick="openEditModal('${p.title}', ${p.price}, ${p.quantity})">✏️ Edit</button>
                            <button class="card-btn delete-btn" onclick="performDelete('${p.title}')">🗑️ Del</button>
                        </div>
                    </div>`;
                container.innerHTML += card;
            });
        }

        function filterProducts(categoryName) { 
            fetch('http://localhost:8080/products')
                .then(r => r.json())
                .then(all => {
                    const filtered = all.filter(p => p.catname === categoryName);
                    renderProducts(filtered);
                    document.getElementById('page-title').innerText = `Κατηγορία: ${categoryName}`;
                }); 
        }

        // --- ΛΕΙΤΟΥΡΓΙΕΣ ADMIN (CRUD) ---

        function performDelete(title) { 
            if(confirm('Είστε σίγουροι για τη διαγραφή του: ' + title + ';')) {
                fetch('http://localhost:8080/admin/delete?title=' + encodeURIComponent(title))
                    .then(() => {
                        alert('Το προϊόν διαγράφηκε επιτυχώς!');
                        loadAllProducts();
                    }); 
            }
        }

        function performAdd() {
            // Παίρνουμε τις τιμές από τη φόρμα HTML
            const t = encodeURIComponent(document.getElementById('add-title').value); 
            const d = encodeURIComponent(document.getElementById('add-desc').value); 
            const c = encodeURIComponent(document.getElementById('add-cat').value); 
            const s = encodeURIComponent(document.getElementById('add-sub').value); 
            const p = encodeURIComponent(document.getElementById('add-price').value); 
            const q = encodeURIComponent(document.getElementById('add-qty').value);
            
            const url = `http://localhost:8080/admin/add?title=${t}&description=${d}&category=${c}&subcategory=${s}&price=${p}&quantity=${q}`;
            
            fetch(url)
                .then(r => r.text())
                .then(res => { 
                    if(res === 'success') {
                        alert('Το προϊόν προστέθηκε επιτυχώς!');
                        closeAllModals();
                        loadAllProducts();
                    } else {
                        alert('Σφάλμα κατά την προσθήκη. Ελέγξτε τα στοιχεία.'); 
                    }
                });
        }

        function performUpdate() {
            const title = encodeURIComponent(document.getElementById('edit-original-title').value); 
            const price = encodeURIComponent(document.getElementById('edit-price').value); 
            const qty = encodeURIComponent(document.getElementById('edit-qty').value);
            
            fetch(`http://localhost:8080/admin/update?title=${title}&price=${price}&quantity=${qty}`)
                .then(r => r.text())
                .then(res => { 
                    if(res === 'success') {
                        alert('Τα στοιχεία ενημερώθηκαν!');
                        closeAllModals();
                        loadAllProducts();
                    } else {
                        alert('Υπήρξε κάποιο σφάλμα στην ενημέρωση.'); 
                    }
                });
        }

        function showStats(type) { 
            closeAllModals(); 
            document.getElementById('modal-overlay').style.display = 'block'; 
            document.getElementById('stats-modal').style.display = 'flex'; 
            
            document.getElementById('stats-title').innerText = type === 'topsellers' ? 'Top Sellers' : 'Ελλείψεις'; 
            
            fetch('http://localhost:8080/admin/stats/' + type)
                .then(r => r.text())
                .then(txt => {
                    document.getElementById('stats-content').innerText = txt;
                }); 
                
            toggleMenu(); 
        }

        // --- UI UTILS (Κλείσιμο/Άνοιγμα παραθύρων) ---

        function openAddModal() { 
            closeAllModals(); 
            document.getElementById('modal-overlay').style.display = 'block'; 
            document.getElementById('add-modal').style.display = 'flex'; 
            toggleMenu(); 
        }

        function openEditModal(title, price, qty) { 
            closeAllModals(); 
            document.getElementById('modal-overlay').style.display = 'block'; 
            document.getElementById('edit-modal').style.display = 'flex'; 
            
            // Γεμίζουμε τη φόρμα με τα τρέχοντα δεδομένα
            document.getElementById('edit-title').value = title; 
            document.getElementById('edit-original-title').value = title; 
            document.getElementById('edit-price').value = price; 
            document.getElementById('edit-qty').value = qty; 
        }

        function toggleMenu() { 
            const sidebar = document.getElementById("mySidebar"); 
            const overlay = document.getElementById("overlay"); 
            sidebar.classList.toggle("active"); 
            overlay.style.display = sidebar.classList.contains("active") ? "block" : "none"; 
        }

        function closeAllModals() { 
            document.getElementById('modal-overlay').style.display = 'none'; 
            document.getElementById('overlay').style.display = 'none'; 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
            document.getElementById("mySidebar").classList.remove("active"); 
        }
    </script>
</body>
</html>
